model_name: "vinai/phobert-base"
# PhoBERT hard limit: 258 tokens (256 + CLS + SEP)
max_length: 256
stride: 128  # sliding window overlap in subword tokens (128 = 50% overlap)
num_train_epochs: 7
learning_rate: 2.0e-5
# batch_size=8 để an toàn với P100 16GB (PhoBERT max_length=256)
# 512 tokens × 8 batch × 768 hidden × fp16 ≈ 3GB activations/layer — an toàn
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
weight_decay: 0.01
warmup_steps: 100
logging_steps: 50
eval_strategy: "epoch"
save_strategy: "epoch"
save_total_limit: 1
save_only_model: true
load_best_model_at_end: true
metric_for_best_model: "f1"
optim: "adamw_torch"
early_stopping_patience: 2
train_split: 0.8
valid_split: 0.1
