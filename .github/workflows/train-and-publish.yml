###############################################################################
# VietNerm — CI/CD: Kaggle GPU Training → HuggingFace Hub
###############################################################################

name: "Train on Kaggle & Publish to HuggingFace"

on:
  workflow_dispatch:
    inputs:
      doc_types:
        description: "Doc types to train (comma-separated, empty = all)"
        required: false
        default: ""
        type: string
      dataset_size:
        description: "Number of synthetic samples to generate"
        required: false
        default: "2000"
        type: string
      train_epochs:
        description: "Number of training epochs"
        required: false
        default: "5"
        type: string
      batch_size:
        description: "Training batch size"
        required: false
        default: "16"
        type: string
      min_f1:
        description: "Minimum F1 score to publish"
        required: false
        default: "0.2"
        type: string
      hf_private:
        description: "Create private HuggingFace repos"
        required: false
        default: false
        type: boolean

  push:
    branches: [main]
    paths:
      - "training/**"
      - "synthetic/**"
      - "huggingface/**"
      - "registry/**"
      - "templates/**"
      - "kaggle/**"

concurrency:
  group: kaggle-training-${{ github.ref }}
  cancel-in-progress: true

env:
  KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
  KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
  KERNEL_SLUG: "${{ secrets.KAGGLE_USERNAME }}/vietnerm-train-pipeline"

jobs:
  train-on-kaggle:
    name: "🏋️ Train on Kaggle GPU"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    outputs:
      kernel_status: ${{ steps.poll.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Prepare Kaggle kernel metadata
        run: |
          python - <<'PYEOF'
          import json
          import os

          meta_path = "kaggle/kernel-metadata.json"
          with open(meta_path, "r") as f:
              meta = json.load(f)

          meta["id"] = os.environ.get("KERNEL_SLUG", "")
          
          with open(meta_path, "w") as f:
              json.dump(meta, f, indent=2)

          print(f"Kernel ID set to: {meta['id']}")
          PYEOF
        env:
          KERNEL_SLUG: ${{ env.KERNEL_SLUG }}

      - name: Configure training parameters & Inject Env
        env:
          INPUT_HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_HF_USERNAME: ${{ secrets.HF_USERNAME || 'ngocthanhdoan' }}
          INPUT_DOC_TYPES: ${{ inputs.doc_types || '' }}
          INPUT_DATASET_SIZE: ${{ inputs.dataset_size || '2000' }}
          INPUT_TRAIN_EPOCHS: ${{ inputs.train_epochs || '5' }}
          INPUT_BATCH_SIZE: ${{ inputs.batch_size || '16' }}
          INPUT_MIN_F1: ${{ inputs.min_f1 || '0.2' }}
          INPUT_HF_PRIVATE: ${{ inputs.hf_private && 'true' || 'false' }}
          INPUT_GITHUB_BRANCH: ${{ github.ref_name }}
        run: |
          # Create env override file
          cat <<EOF > /tmp/_env_override.py
          import os
          os.environ["HF_TOKEN"] = "${INPUT_HF_TOKEN}"
          os.environ["HF_USERNAME"] = "${INPUT_HF_USERNAME}"
          os.environ["DOC_TYPES"] = "${INPUT_DOC_TYPES}"
          os.environ["DATASET_SIZE"] = "${INPUT_DATASET_SIZE}"
          os.environ["TRAIN_EPOCHS"] = "${INPUT_TRAIN_EPOCHS}"
          os.environ["BATCH_SIZE"] = "${INPUT_BATCH_SIZE}"
          os.environ["MIN_F1"] = "${INPUT_MIN_F1}"
          os.environ["HF_PRIVATE"] = "${INPUT_HF_PRIVATE}"
          os.environ["GITHUB_BRANCH"] = "${INPUT_GITHUB_BRANCH}"
          EOF

          # Prepend to kernel script
          cat /tmp/_env_override.py kaggle/vietnerm_train_kernel.py > kaggle/_final_kernel.py
          mv kaggle/_final_kernel.py kaggle/vietnerm_train_kernel.py
          
          echo "=== Training Config Injected ==="
          echo "Doc Types:    ${INPUT_DOC_TYPES:-all}"
          echo "Dataset Size: ${INPUT_DATASET_SIZE}"

      - name: Push kernel to Kaggle
        run: |
          echo "Pushing kernel to Kaggle..."
          kaggle kernels push -p kaggle/
          echo "Kernel pushed: ${{ env.KERNEL_SLUG }}"

      - name: Poll kernel status
        id: poll
        run: |
          echo "Waiting for Kaggle kernel to complete..."
          POLL_INTERVAL=60
          MAX_POLLS=150
          POLL_COUNT=0

          while [ $POLL_COUNT -lt $MAX_POLLS ]; do
            POLL_COUNT=$((POLL_COUNT + 1))
            STATUS=$(kaggle kernels status "${{ env.KERNEL_SLUG }}" 2>&1 || true)
            echo "[$(date '+%H:%M:%S')] Poll #${POLL_COUNT}: ${STATUS}"
            
            if echo "$STATUS" | grep -qi "complete"; then
              echo "Kernel completed successfully!"
              echo "status=complete" >> "$GITHUB_OUTPUT"
              exit 0
            elif echo "$STATUS" | grep -qi "error\|failed\|cancelled"; then
              echo "Kernel failed!"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            sleep $POLL_INTERVAL
          done

          echo "Timeout waiting for kernel!"
          echo "status=timeout" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Download & Upload artifacts
        if: steps.poll.outputs.status == 'complete'
        run: |
          mkdir -p kaggle-output
          kaggle kernels output "${{ env.KERNEL_SLUG }}" -p kaggle-output/
        
      - name: Upload to Actions
        if: steps.poll.outputs.status == 'complete'
        uses: actions/upload-artifact@v4
        with:
          name: training-output
          path: kaggle-output/
          retention-days: 30

  report:
    name: "📊 Training Report"
    runs-on: ubuntu-latest
    needs: train-on-kaggle
    if: always()
    steps:
      - name: Download artifacts
        if: needs.train-on-kaggle.outputs.kernel_status == 'complete'
        uses: actions/download-artifact@v4
        with:
          name: training-output
          path: training-output/

      - name: Generate summary
        run: |
          echo "## 🇻🇳 VietNerm Training Report" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.train-on-kaggle.outputs.kernel_status }}" != "complete" ]; then
            echo "❌ **Kernel Failed or Timed Out**" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          if [ -f training-output/train_results.json ]; then
            python3 << 'PYEOF'
          import json
          import os

          with open("training-output/train_results.json") as f:
              data = json.load(f)

          config = data.get("config", {})
          results = data.get("results", {})

          summary = []
          summary.append(f"**Total Time:** {data.get('total_minutes', '?')} minutes")
          summary.append(f"**Dataset Size:** {config.get('dataset_size', '?'):,}")
          summary.append("| Doc Type | Status | F1 | Model URL |")
          summary.append("|----------|--------|----|-----------|")

          for doc_type, r in results.items():
              icon = "✅" if r["status"] == "published" else "❌"
              f1 = f"{r.get('f1', 0):.4f}" if r.get("f1") else "—"
              url = r.get("model_url", "—")
              if url != "—": url = f"[Link]({url})"
              summary.append(f"| {icon} {doc_type} | {r['status']} | {f1} | {url} |")

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as f:
              f.write("\n" + "\n".join(summary))
          PYEOF
          else
            echo "⚠️ No results found." >> $GITHUB_STEP_SUMMARY
          fi