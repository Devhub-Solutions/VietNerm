###############################################################################
# VietNerm — CI/CD: Kaggle GPU Training → HuggingFace Hub
###############################################################################

name: "Train on Kaggle & Publish to HuggingFace"

on:
  workflow_dispatch:
    inputs:
      doc_types:
        description: "Doc types to train (comma-separated, empty = all)"
        required: false
        default: ""
        type: string
      dataset_size:
        description: "Number of synthetic samples to generate"
        required: false
        default: "2000"
        type: string
      train_epochs:
        description: "Number of training epochs"
        required: false
        default: "5"
        type: string
      batch_size:
        description: "Training batch size"
        required: false
        default: "16"
        type: string
      min_f1:
        description: "Minimum F1 score to publish"
        required: false
        default: "0.2"
        type: string
      hf_private:
        description: "Create private HuggingFace repos"
        required: false
        default: false
        type: boolean

  push:
    branches: [main]
    paths:
      - "training/**"
      - "synthetic/**"
      - "huggingface/**"
      - "registry/**"
      - "templates/**"
      - "kaggle/**"

concurrency:
  group: kaggle-training-${{ github.ref }}
  cancel-in-progress: true

env:
  KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
  KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
  KERNEL_SLUG: "${{ secrets.KAGGLE_USERNAME }}/vietnerm-train-pipeline"

jobs:
  # ================================================================
  # Job 1: Train on Kaggle GPU
  # ================================================================
  train-on-kaggle:
    name: "🏋️ Train on Kaggle GPU"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    outputs:
      kernel_status: ${{ steps.poll.outputs.status }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Validate Kaggle credentials
        run: |
          if [ -z "$KAGGLE_USERNAME" ] || [ -z "$KAGGLE_KEY" ]; then
            echo "ERROR: KAGGLE_USERNAME or KAGGLE_KEY secret is not set!"
            echo "Please add these secrets in: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "Kaggle credentials: OK (user=$KAGGLE_USERNAME)"

      - name: Prepare Kaggle kernel metadata
        run: |
          python3 - <<'PYEOF'
          import json
          import os

          meta_path = "kaggle/kernel-metadata.json"
          with open(meta_path, "r") as f:
              meta = json.load(f)

          meta["id"] = os.environ.get("KERNEL_SLUG", "")

          with open(meta_path, "w") as f:
              json.dump(meta, f, indent=2)

          print(f"Kernel ID set to: {meta['id']}")
          print(f"GPU: {meta.get('enable_gpu', False)}")
          print(f"Internet: {meta.get('enable_internet', False)}")
          PYEOF
        env:
          KERNEL_SLUG: ${{ env.KERNEL_SLUG }}

      # ── Inject env vars vào kernel script ──
      - name: Configure training parameters
        run: |
          # Tạo env block ở đầu kernel script
          cat > kaggle/_env_override.py << 'PYEOF'
          import os
          # CI/CD injected environment variables
          os.environ["HF_TOKEN"] = "${{ secrets.HF_TOKEN }}"
          os.environ["HF_USERNAME"] = "${{ secrets.HF_USERNAME || 'ngocthanhdoan' }}"
          os.environ["DOC_TYPES"] = "${{ inputs.doc_types || '' }}"
          os.environ["DATASET_SIZE"] = "${{ inputs.dataset_size || '2000' }}"
          os.environ["TRAIN_EPOCHS"] = "${{ inputs.train_epochs || '5' }}"
          os.environ["BATCH_SIZE"] = "${{ inputs.batch_size || '16' }}"
          os.environ["MIN_F1"] = "${{ inputs.min_f1 || '0.2' }}"
          os.environ["HF_PRIVATE"] = "${{ inputs.hf_private && 'true' || 'false' }}"
          os.environ["GITHUB_BRANCH"] = "${{ github.ref_name }}"
          PYEOF

          # Prepend env overrides vào kernel script
          cat kaggle/_env_override.py kaggle/vietnerm_train_kernel.py > kaggle/_final_kernel.py
          mv kaggle/_final_kernel.py kaggle/vietnerm_train_kernel.py
          rm kaggle/_env_override.py

          echo "=== Training Config ==="
          echo "Doc Types:    ${{ inputs.doc_types || 'all' }}"
          echo "Dataset Size: ${{ inputs.dataset_size || '2000' }}"
          echo "Epochs:       ${{ inputs.train_epochs || '5' }}"
          echo "Batch Size:   ${{ inputs.batch_size || '16' }}"
          echo "Min F1:       ${{ inputs.min_f1 || '0.2' }}"

      # ── Push kernel lên Kaggle ──
      - name: Push kernel to Kaggle
        run: |
          echo "Pushing kernel to Kaggle..."
          kaggle kernels push -p kaggle/
          echo "Kernel pushed: ${{ env.KERNEL_SLUG }}"

      # ── Poll kernel status ──
      - name: Poll kernel status
        id: poll
        run: |
          echo "Waiting for Kaggle kernel to complete..."
          echo "Kernel: ${{ env.KERNEL_SLUG }}"

          POLL_INTERVAL=60   # Kiểm tra mỗi 60 giây
          MAX_POLLS=150      # Max 150 * 60s = 2.5 giờ
          POLL_COUNT=0

          while [ $POLL_COUNT -lt $MAX_POLLS ]; do
            POLL_COUNT=$((POLL_COUNT + 1))

            STATUS=$(kaggle kernels status "${{ env.KERNEL_SLUG }}" 2>&1 || true)
            echo "[$(date '+%H:%M:%S')] Poll #${POLL_COUNT}: ${STATUS}"

            if echo "$STATUS" | grep -qi "complete"; then
              echo "Kernel completed successfully!"
              echo "status=complete" >> "$GITHUB_OUTPUT"
              exit 0
            elif echo "$STATUS" | grep -qi "error\|failed\|cancelled"; then
              echo "Kernel failed!"
              echo "status=failed" >> "$GITHUB_OUTPUT"

              # Lấy log để debug
              echo "=== Kernel Output Log ==="
              kaggle kernels output "${{ env.KERNEL_SLUG }}" -p /tmp/kaggle-output 2>/dev/null || true
              if ls /tmp/kaggle-output/*.log 2>/dev/null; then
                tail -100 /tmp/kaggle-output/*.log
              fi
              exit 1
            fi
            sleep $POLL_INTERVAL
          done

          echo "Timeout waiting for kernel!"
          echo "status=timeout" >> "$GITHUB_OUTPUT"
          exit 1

      # ── Download kernel output ──
      - name: Download kernel output
        if: steps.poll.outputs.status == 'complete'
        run: |
          mkdir -p kaggle-output
          kaggle kernels output "${{ env.KERNEL_SLUG }}" -p kaggle-output/

          echo "=== Downloaded Files ==="
          find kaggle-output/ -type f | head -50

          # Hiển thị training results
          if [ -f kaggle-output/train_results.json ]; then
            echo ""
            echo "=== Training Results ==="
            python3 -m json.tool kaggle-output/train_results.json
          fi

      # ── Upload artifacts ──
      - name: Upload training artifacts
        if: steps.poll.outputs.status == 'complete'
        uses: actions/upload-artifact@v4
        with:
          name: training-output
          path: kaggle-output/
          retention-days: 30

  # ================================================================
  # Job 2: Verify & Report
  # ================================================================
  report:
    name: "📊 Training Report"
    runs-on: ubuntu-latest
    needs: train-on-kaggle
    if: always()

    steps:
      - name: Download artifacts
        if: needs.train-on-kaggle.outputs.kernel_status == 'complete'
        uses: actions/download-artifact@v4
        with:
          name: training-output
          path: training-output/

      - name: Generate summary
        run: |
          echo "## 🇻🇳 VietNerm Training Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.train-on-kaggle.outputs.kernel_status }}" != "complete" ]; then
            echo "❌ **Kernel Status:** ${{ needs.train-on-kaggle.outputs.kernel_status }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the Kaggle kernel logs for details." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          if [ -f training-output/train_results.json ]; then
            python3 - << 'PYEOF'
          import json
          import os

          with open("training-output/train_results.json") as f:
              data = json.load(f)

          config = data.get("config", {})
          results = data.get("results", {})

          summary = []
          summary.append(f"**Total Time:** {data.get('total_minutes', '?')} minutes")
          summary.append(f"**Dataset Size:** {config.get('dataset_size', '?'):,}")
          summary.append(f"**Epochs:** {config.get('train_epochs', '?')}")
          summary.append(f"**Batch Size:** {config.get('batch_size', '?')}")
          summary.append("")
          summary.append("| Doc Type | Status | F1 | Time | Model URL |")
          summary.append("|----------|--------|----|------|-----------|")

          for doc_type, r in results.items():
              icon = {"published": "✅", "low_f1": "⚠️"}.get(r["status"], "❌")
              f1 = f"{r.get('f1', 0):.4f}" if r.get("f1") else "—"
              time_m = f"{r.get('time_minutes', 0)}m"
              url = r.get("model_url", "—")
              if url != "—":
                  url = f"[Link]({url})"
              summary.append(f"| {icon} {doc_type} | {r['status']} | {f1} | {time_m} | {url} |")

          published = sum(1 for r in results.values() if r["status"] == "published")
          summary.append("")
          summary.append(f"**Result:** {published}/{len(results)} models published")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("\n".join(summary))
          PYEOF
          else
            echo "⚠️ No training results file found." >> $GITHUB_STEP_SUMMARY
          fi
