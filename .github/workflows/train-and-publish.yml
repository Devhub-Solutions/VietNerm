name: VietNerm Train & Publish

# Trigger on push to main when pipeline-relevant files change, or manually
on:
  push:
    branches: [main]
    paths:
      - "templates/**"
      - "training/**"
      - "synthetic/**"
      - "registry/**"
      - "scripts/**"
      - "huggingface/**"
      - "requirements.txt"
      - ".github/workflows/train-and-publish.yml"
      - ".github/workflows/scripts/**"
  workflow_dispatch:
    inputs:
      doc_type:
        description: "Specific doc type to train (leave empty for all)"
        required: false
        default: ""
        type: string

# Prevent parallel pipeline runs
concurrency:
  group: train-and-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # Required for creating GitHub Releases

jobs:
  # ============================================================
  # Job 1: Discover document types from registry
  # ============================================================
  discover-docs:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Discover doc types from registry
        id: set-matrix
        run: |
          INPUT_DOC_TYPE="${{ github.event.inputs.doc_type }}"

          if [ -n "${INPUT_DOC_TYPE}" ]; then
            # Manual trigger with specific doc type — validate it exists
            doc_types=$(python .github/workflows/scripts/discover_docs.py --filter "${INPUT_DOC_TYPE}")
          else
            # Auto trigger — discover all doc types
            doc_types=$(python .github/workflows/scripts/discover_docs.py)
          fi

          echo "matrix={\"doc_type\":${doc_types}}" >> "$GITHUB_OUTPUT"
          echo "Build matrix: ${doc_types}"

  # ============================================================
  # Job 2: Generate synthetic training data (per doc type)
  # ============================================================
  generate-data:
    runs-on: ubuntu-latest
    needs: discover-docs
    strategy:
      matrix: ${{ fromJson(needs.discover-docs.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic dataset for ${{ matrix.doc_type }}
        run: |
          echo "==> Generating dataset for ${{ matrix.doc_type }} (5000 samples)..."
          python synthetic/generate_dataset.py \
            --doc "${{ matrix.doc_type }}" \
            --size 5000
          echo "==> Dataset generated successfully."
          echo "==> Files:"
          ls -la datasets/ner/${{ matrix.doc_type }}/

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: dataset-${{ matrix.doc_type }}
          path: datasets/ner/${{ matrix.doc_type }}/
          retention-days: 7

  # ============================================================
  # Job 3: Train PhoBERT NER model (per doc type)
  # ============================================================
  train:
    runs-on: ubuntu-latest
    needs: [discover-docs, generate-data]
    strategy:
      matrix: ${{ fromJson(needs.discover-docs.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Cache the pretrained PhoBERT model (~400MB) to speed up subsequent runs
      - name: Cache HuggingFace pretrained models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/
          key: ${{ runner.os }}-hf-phobert-base-v1
          restore-keys: |
            ${{ runner.os }}-hf-phobert-base-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset artifact
        uses: actions/download-artifact@v4
        with:
          name: dataset-${{ matrix.doc_type }}
          path: datasets/ner/${{ matrix.doc_type }}/

      - name: Train model for ${{ matrix.doc_type }}
        run: |
          echo "==> Training PhoBERT NER for ${{ matrix.doc_type }} (3 epochs, CPU)..."
          python training/train.py \
            --doc "${{ matrix.doc_type }}" \
            --epochs 3
          echo "==> Training complete."
          echo "==> Model files:"
          ls -la models/phobert/${{ matrix.doc_type }}/

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ matrix.doc_type }}
          path: models/phobert/${{ matrix.doc_type }}/
          retention-days: 14

      # Upload training logs/metrics if trainer_state.json exists
      - name: Upload training metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.doc_type }}
          path: |
            models/phobert/${{ matrix.doc_type }}/trainer_state.json
            models/phobert/${{ matrix.doc_type }}/training_args.bin
          if-no-files-found: warn
          retention-days: 14

  # ============================================================
  # Job 4: Evaluate trained model (per doc type)
  # ============================================================
  evaluate:
    runs-on: ubuntu-latest
    needs: [discover-docs, train, generate-data]
    strategy:
      matrix: ${{ fromJson(needs.discover-docs.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Restore PhoBERT cache for inference
      - name: Cache HuggingFace pretrained models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub/
          key: ${{ runner.os }}-hf-phobert-base-v1
          restore-keys: |
            ${{ runner.os }}-hf-phobert-base-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-${{ matrix.doc_type }}
          path: models/phobert/${{ matrix.doc_type }}/

      - name: Download dataset artifact
        uses: actions/download-artifact@v4
        with:
          name: dataset-${{ matrix.doc_type }}
          path: datasets/ner/${{ matrix.doc_type }}/

      - name: Evaluate model for ${{ matrix.doc_type }}
        run: |
          echo "==> Evaluating model for ${{ matrix.doc_type }}..."
          python .github/workflows/scripts/evaluate_model.py \
            --doc "${{ matrix.doc_type }}" \
            --model-dir "models/phobert/${{ matrix.doc_type }}" \
            --dataset-dir "datasets/ner/${{ matrix.doc_type }}" \
            --min-f1 0.5

  # ============================================================
  # Job 5: Publish to HuggingFace Hub (per doc type)
  # ============================================================
  publish-huggingface:
    runs-on: ubuntu-latest
    needs: [discover-docs, evaluate, generate-data]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix: ${{ fromJson(needs.discover-docs.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-${{ matrix.doc_type }}
          path: models/phobert/${{ matrix.doc_type }}/

      - name: Download dataset artifact
        uses: actions/download-artifact@v4
        with:
          name: dataset-${{ matrix.doc_type }}
          path: datasets/ner/${{ matrix.doc_type }}/

      - name: Publish model to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "==> Publishing model for ${{ matrix.doc_type }}..."
          python huggingface/push_model.py \
            --doc "${{ matrix.doc_type }}" \
            --repo "vietnerm/phobert-${{ matrix.doc_type }}-ner" \
            --token "${HF_TOKEN}"

      - name: Publish dataset to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "==> Publishing dataset for ${{ matrix.doc_type }}..."
          python huggingface/push_dataset.py \
            --doc "${{ matrix.doc_type }}" \
            --repo "vietnerm/vietnerm-${{ matrix.doc_type }}-dataset" \
            --token "${HF_TOKEN}"

  # ============================================================
  # Job 6: Create GitHub Release (runs once after all publishing)
  # ============================================================
  create-github-release:
    runs-on: ubuntu-latest
    needs: [discover-docs, publish-huggingface]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for release notes

      - name: Download all model artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: model-*
          path: release-models/
          merge-multiple: false

      - name: Prepare release assets
        id: prep
        run: |
          # Create tag from date + short SHA
          TAG="v$(date +%Y%m%d)-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Package each model as a tar.gz
          cd release-models
          for model_dir in model-*/; do
            doc_type="${model_dir#model-}"
            doc_type="${doc_type%/}"
            tar -czf "../vietnerm-${doc_type}-model.tar.gz" -C "${model_dir}" .
            echo "Packaged: vietnerm-${doc_type}-model.tar.gz"
          done
          cd ..
          ls -la vietnerm-*-model.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag }}
          name: "VietNerm ${{ steps.prep.outputs.tag }}"
          generate_release_notes: true
          files: vietnerm-*-model.tar.gz
          body: |
            ## VietNerm Model Release

            Automated release from commit ${{ github.sha }}.

            ### Published Models
            Models and datasets have been published to HuggingFace Hub under the `vietnerm` organization.

            ### Artifacts
            Each `.tar.gz` contains the trained PhoBERT NER model for a specific document type.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
