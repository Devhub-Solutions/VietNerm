###############################################################################
# VietNerm — CI/CD: Build & Publish SDK to PyPI
#
# Triggers:
#   - Push tag matching v* (e.g., v0.1.0, v1.2.3)
#   - Manual dispatch (for testing / emergency publish)
#
# Required secrets:
#   PYPI_API_TOKEN  — PyPI API token (scope: project "vietnerm")
#                     Create at: https://pypi.org/manage/account/token/
#
# Release workflow:
#   1. Bump version in sdk/vietnerm/__init__.py (__version__ = "x.y.z")
#   2. Commit: git commit -m "chore: bump version to x.y.z"
#   3. Tag:    git tag vx.y.z && git push origin vx.y.z
#   4. This workflow runs automatically and publishes to PyPI
###############################################################################
name: "Publish SDK to PyPI"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, do not publish)"
        required: false
        default: false
        type: boolean

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ================================================================
  # Job 1: Build distribution packages
  # ================================================================
  build:
    name: "📦 Build SDK"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Get version from __init__.py
        id: get_version
        run: |
          VERSION=$(python3 -c "
          import ast, sys
          with open('sdk/vietnerm/__init__.py', 'r', encoding='utf-8') as f:
              tree = ast.parse(f.read())
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == '__version__':
                          print(ast.literal_eval(node.value))
                          sys.exit(0)
          print('unknown')
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.get_version.outputs.version }}"
          EXPECTED_TAG="v${VERSION}"
          echo "Tag from ref: ${TAG}"
          echo "Version from package: ${VERSION}"
          if [ "${TAG}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Tag/version mismatch. Expected ${EXPECTED_TAG} but got ${TAG}."
            exit 1
          fi

     

      - name: Build wheel and sdist
        working-directory: sdk
        run: python -m build --outdir ../dist/

      - name: Verify distribution
        run: |
          echo "=== Distribution files ==="
          ls -lh dist/
          echo ""
          echo "=== Twine check ==="
          twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 7

  # ================================================================
  # Job 2: Publish to PyPI
  # ================================================================
  publish:
    name: "🚀 Publish to PyPI"
    runs-on: ubuntu-latest
    needs: build
    # Only publish on real tag pushes, not manual dry-run
    if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.dry_run != 'true'
    environment:
      name: pypi
      url: https://pypi.org/project/vietnerm/
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Option A: OIDC Trusted Publishing (recommended, no token needed)
          # Configure at: https://pypi.org/manage/project/vietnerm/settings/publishing/
          # Option B: API Token (fallback)
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: false
          verbose: true

  # ================================================================
  # Job 3: Create GitHub Release
  # ================================================================
  release:
    name: "📋 Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [build, publish]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "VietNerm SDK ${{ needs.build.outputs.version }}"
          body: |
            ## VietNerm SDK v${{ needs.build.outputs.version }}

            ### Install
            ```bash
            pip install vietnerm==${{ needs.build.outputs.version }}
            ```

            ### Quick Start
            ```python
            from vietnerm import CCCDNer

            ner = CCCDNer()
            result = ner.extract("Họ và tên: Nguyễn Văn A\nNgày sinh: 01/01/1990")
            print(result)
            ```

            ### Models on HuggingFace Hub
            - [phobert-cccd-ner](https://huggingface.co/ngocthanhdoan/phobert-cccd-ner)
            - [phobert-giay-ra-vien-ner](https://huggingface.co/ngocthanhdoan/phobert-giay-ra-vien-ner)
            - [phobert-vehicle-registration-ner](https://huggingface.co/ngocthanhdoan/phobert-vehicle-registration-ner)

            ### Changes
            See [CHANGELOG](https://github.com/Devhub-Solutions/VietNerm/blob/main/CHANGELOG.md) for details.
          files: dist/*
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, 'a') || contains(needs.build.outputs.version, 'b') || contains(needs.build.outputs.version, 'rc') }}

  # ================================================================
  # Job 4: Summary
  # ================================================================
  summary:
    name: "📊 Summary"
    runs-on: ubuntu-latest
    needs: [build, publish]
    if: always()
    steps:
      - name: Write summary
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          BUILD="${{ needs.build.result }}"
          PUBLISH="${{ needs.publish.result }}"
          DRY="${{ github.event.inputs.dry_run }}"

          echo "## 📦 VietNerm SDK Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          BUILD_ICON="✅"
          [ "$BUILD" != "success" ] && BUILD_ICON="❌"
          echo "| Build \`v${VERSION}\` | ${BUILD_ICON} ${BUILD} |" >> $GITHUB_STEP_SUMMARY

          if [ "$DRY" = "true" ]; then
            echo "| Publish | ⏭️ skipped (dry run) |" >> $GITHUB_STEP_SUMMARY
          else
            PUBLISH_ICON="✅"
            [ "$PUBLISH" = "skipped" ] && PUBLISH_ICON="⏭️"
            [ "$PUBLISH" != "success" ] && [ "$PUBLISH" != "skipped" ] && PUBLISH_ICON="❌"
            echo "| Publish to PyPI | ${PUBLISH_ICON} ${PUBLISH} |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$PUBLISH" = "success" ]; then
            echo "🎉 **Published:** https://pypi.org/project/vietnerm/${VERSION}/" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "pip install vietnerm==${VERSION}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
