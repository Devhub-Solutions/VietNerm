name: VietNerm CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Discover doc types from registry instead of hardcoding
  discover-docs:
    runs-on: ubuntu-latest
    outputs:
      doc_types: ${{ steps.discover.outputs.doc_types }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Discover doc types from registry
        id: discover
        run: |
          doc_types=$(python .github/workflows/scripts/discover_docs.py)
          echo "doc_types=${doc_types}" >> "$GITHUB_OUTPUT"
          echo "Discovered doc types: ${doc_types}"

  lint-and-test:
    runs-on: ubuntu-latest
    needs: discover-docs
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,__pycache__,.github,raw_code
          # Warnings as non-blocking
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics \
            --exclude=.git,__pycache__,.github,raw_code

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(find tests -name 'test_*.py' | head -1)" ]; then
            python -m pytest tests/ -v
          else
            echo "No tests found, skipping."
          fi

      - name: Validate data generation (smoke test — all doc types)
        env:
          DOC_TYPES: ${{ needs.discover-docs.outputs.doc_types }}
        run: |
          # Auto-discover doc types from registry and smoke-test each one
          for doc_type in $(echo "${DOC_TYPES}" | python -c "import sys,json; print(' '.join(json.load(sys.stdin)))"); do
            echo "==> Testing generate_dataset.py for ${doc_type}..."
            python synthetic/generate_dataset.py --doc "${doc_type}" --size 10 || \
              echo "[WARN] generate_dataset.py not yet available for ${doc_type}"
          done

      - name: Validate imports
        run: |
          python -c "from inference.pipeline import NERPipeline; print('inference OK')"
          python -c "from inference.schema_mapper import SchemaMapper; print('schema_mapper OK')"
          python -c "from inference.postprocess import merge_subtoken_predictions; print('postprocess OK')"
          echo "All imports validated."
